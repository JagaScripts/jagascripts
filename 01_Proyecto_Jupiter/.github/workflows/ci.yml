name: CI Phishing-Detect

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main] # <-- Añadimos main aquí también

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: phishing-detect

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: phishing-detect/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run flake8
        run: |
          flake8 app/ \
            --max-line-length=120 \
            --exclude=__pycache__,.venv \
            --count --statistics

  unit-tests:
    name: Unit Tests
    env:
      OPENAI_API_KEY: test-key
      VIRUSTOTAL_API_KEY: test-key
      GOOGLE_API_KEY: test-key
      DATABASE_URL: postgresql://user:pass@localhost/db
      REDIS_URL: redis://localhost:6379/0
      QDRANT_URL: http://localhost:6333
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: phishing-detect

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Iniciar pruebas unitarias
        env:
          OPENAI_API_KEY: test-key
          VIRUSTOTAL_API_KEY: test-key
          GOOGLE_API_KEY: test-key
          DATABASE_URL: postgresql+psycopg://user:pass@localhost/db
          REDIS_URL: redis://localhost:6379/0
          QDRANT_URL: http://localhost:6333  
        run: pytest tests/unit/ -v --tb=short --cov=app --cov-report=term-missing --html=reports/test_report_coverage.html --self-contained-html

      - name: Subir informe pruebas unitarias
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: phishing-detect/reports/
        continue-on-error: true

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: unit-tests
    defaults:
      run:
        working-directory: phishing-detect

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
      
    steps:
      - uses: actions/checkout@v4

      - name: Construyendo la imagen Docker
        run: docker build -t phishing-detect:ci .

      - name: Verificando imágen Docker
        run: |
          docker run --rm \
            --network host \
            -e DATABASE_URL=postgresql+psycopg://testuser:testpass@localhost:5432/testdb \
            -e REDIS_URL=redis://localhost:6379/0 \
            -e OPENAI_API_KEY=test-key \
            -e VIRUSTOTAL_API_KEY=test-key \
            -e GOOGLE_API_KEY=test-key \
            -e QDRANT_URL=http://localhost:6333 \
            phishing-detect:ci \
            python -c "from app.main import create_app; create_app(); print('OK')"