version: '3.8'
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_db
    command: ["./qdrant", "--config-path", "/config/config.yaml"]
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
      - ./qdrant_config/config.yaml:/config/config.yaml
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: always
