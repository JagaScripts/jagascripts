<?xml version='1.0' encoding='UTF-8' ?> 
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition 
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:ui="http://java.sun.com/jsf/facelets"
    xmlns:p="http://primefaces.org/ui" template="../../template.xhtml">
    <ui:define name="header">
        <ui:include src="../../header.xhtml"></ui:include>
    </ui:define>
    <ui:define name="sideleft">
        <ui:include src="../../sideleft.xhtml"></ui:include>
    </ui:define>
    <ui:define name="content">
        <p:panel id="offersList">
            <h:form id="OffersListForm">
                <p:panel>
                    <p:dataTable id="datalist" value="#{offersController.businessItems}" var="item"
                                 selectionMode="single" selection="#{offersController.selected}"
                                 paginator="true"
                                 rowKey="#{item.id}"
                                 rows="10"
                                 rowsPerPageTemplate="10,20,30,40,50"
                                 >
                        <f:facet name="header">
                            #{es_bundle.ListOffersTitle}
                        </f:facet>

                        <p:ajax event="rowSelect"   update="createButton viewButton editButton deleteButton"/>
                        <p:ajax event="rowUnselect" update="createButton viewButton editButton deleteButton"/>

                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{es_bundle.ListOffersTitle_id}"/>
                            </f:facet>
                            <h:outputText value="#{item.id}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{es_bundle.ListOffersTitle_title}"/>
                            </f:facet>
                            <h:outputText value="#{item.title}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{es_bundle.ListOffersTitle_description}"/>
                            </f:facet>
                            <h:outputText value="#{item.description}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{es_bundle.ListOffersTitle_startPrice}"/>
                            </f:facet>
                            <h:outputText value="#{item.startPrice}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{es_bundle.ListOffersTitle_offerPrice}"/>
                            </f:facet>
                            <h:outputText value="#{item.offerPrice}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{es_bundle.ListOffersTitle_image}"/>
                            </f:facet>
                            <h:outputText value="#{item.image}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{es_bundle.ListOffersTitle_startDate}"/>
                            </f:facet>
                            <h:outputText value="#{item.startDate}">
                                <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                            </h:outputText>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{es_bundle.ListOffersTitle_endDate}"/>
                            </f:facet>
                            <h:outputText value="#{item.endDate}">
                                <f:convertDateTime pattern="MM/dd/yyyy HH:mm:ss" />
                            </h:outputText>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{es_bundle.ListOffersTitle_active}"/>
                            </f:facet>
                            <p:selectBooleanCheckbox value="#{item.active}" disabled="true"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{es_bundle.ListOffersTitle_applicationUsersId}"/>
                            </f:facet>
                            <h:outputText value="#{userBean.user}"/>
                        </p:column>
                        <f:facet name="footer">
                            <p:commandButton id="createButton" icon="ui-icon-plus"   value="#{es_bundle.Create}" actionListener="#{offersController.prepareCreate}" update=":OffersCreateForm" oncomplete="PF('OffersCreateDialog').show()"/>
                            <p:commandButton id="viewButton"   icon="ui-icon-search" value="#{es_bundle.View}" update=":OffersViewForm" oncomplete="PF('OffersViewDialog').show()" disabled="#{empty offersController.selected}"/>
                            <p:commandButton id="editButton"   icon="ui-icon-pencil" value="#{es_bundle.Edit}" update=":OffersEditForm" oncomplete="PF('OffersEditDialog').show()" disabled="#{empty offersController.selected}"/>
                            <p:commandButton id="deleteButton" icon="ui-icon-trash"  value="#{es_bundle.Delete}" actionListener="#{offersController.destroy}" update=":growl,datalist" disabled="#{empty offersController.selected}"/>
                        </f:facet>
                    </p:dataTable>
                </p:panel>
            </h:form>
            
            <ui:include src="Create.xhtml"/>
            <ui:include src="Edit.xhtml"/>
            <ui:include src="View.xhtml"/>
            </p:panel>
 </ui:define>
    <ui:define name="footer">
        <ui:include src="../../footer.xhtml"></ui:include>
    </ui:define>
</ui:composition>
