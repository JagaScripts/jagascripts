<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog id="OffersEditDlg" widgetVar="OffersEditDialog" modal="true" resizable="false" appendTo="@(body)" header="#{es_bundle.EditOffersTitle}">
            <h:form id="OffersEditForm">
                <h:panelGroup id="display">
                    <p:panelGrid columns="2" rendered="#{offersController.selected != null}">
                        <p:outputLabel value="#{es_bundle.EditOffersLabel_id}" for="id" />
                        <p:inputText id="id" value="#{offersController.selected.id}" title="#{es_bundle.EditOffersTitle_id}" disabled="true"/>
                        <p:outputLabel value="#{es_bundle.EditOffersLabel_title}" for="title" />
                        <p:inputText id="title" value="#{offersController.selected.title}" title="#{es_bundle.EditOffersTitle_title}" required="true" requiredMessage="#{es_bundle.EditOffersRequiredMessage_title}"/>
                        <p:outputLabel value="#{es_bundle.EditOffersLabel_description}" for="description" />
                        <p:inputText id="description" value="#{offersController.selected.description}" title="#{es_bundle.EditOffersTitle_description}" />
                        <p:outputLabel value="#{es_bundle.EditOffersLabel_startPrice}" for="startPrice" />
                        <p:inputText id="startPrice" value="#{offersController.selected.startPrice}" title="#{es_bundle.EditOffersTitle_startPrice}" required="true" requiredMessage="#{es_bundle.EditOffersRequiredMessage_startPrice}"/>
                        <p:outputLabel value="#{es_bundle.EditOffersLabel_offerPrice}" for="offerPrice" />
                        <p:inputText id="offerPrice" value="#{offersController.selected.offerPrice}" title="#{es_bundle.EditOffersTitle_offerPrice}" required="true" requiredMessage="#{es_bundle.EditOffersRequiredMessage_offerPrice}"/>
                        <p:outputLabel value="#{es_bundle.EditOffersLabel_image}" for="image" />
                        <p:inputText id="image" value="#{offersController.selected.image}" title="#{es_bundle.EditOffersTitle_image}" />
                        <p:outputLabel value="#{es_bundle.EditOffersLabel_startDate}" for="startDate" />
                        <p:calendar id="startDate" pattern="MM/dd/yyyy HH:mm:ss" value="#{offersController.selected.startDate}" title="#{es_bundle.EditOffersTitle_startDate}" required="true" requiredMessage="#{es_bundle.EditOffersRequiredMessage_startDate}" showOn="button"/>
                        <p:outputLabel value="#{es_bundle.EditOffersLabel_endDate}" for="endDate" />
                        <p:calendar id="endDate" pattern="MM/dd/yyyy HH:mm:ss" value="#{offersController.selected.endDate}" title="#{es_bundle.EditOffersTitle_endDate}" required="true" requiredMessage="#{es_bundle.EditOffersRequiredMessage_endDate}" showOn="button"/>
                        <p:outputLabel value="#{es_bundle.EditOffersLabel_active}" for="active" />
                        <p:panel id="offerActivePanel">
                            <p>#{es_bundle.ActiveMsg}</p>
                            <p:selectBooleanCheckbox id="active" value="#{offersController.selected.active}" disabled="#{offersController.selected.active == true}"/>
                        </p:panel>
                        <p:outputLabel value="#{es_bundle.EditOffersLabel_applicationUsersId}" for="applicationUsersId" />
                        <p:inputText id="applicationUsersId" value="#{userBean.user}" disabled="true"/>
                    </p:panelGrid>
                    <p:commandButton actionListener="#{offersController.update}" value="#{es_bundle.Save}" update="display,:OffersListForm:datalist,:growl" oncomplete="handleSubmit(args, 'OffersEditDialog');"/>
                    <p:commandButton update="display,:OffersListForm:datalist,:growl" value="#{es_bundle.Cancel}" onclick="OffersEditDialog.hide()"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

    </ui:composition>
</html>
