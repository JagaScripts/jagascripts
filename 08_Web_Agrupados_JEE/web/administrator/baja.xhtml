<?xml version='1.0' encoding='UTF-8' ?> 
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition 
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:ui="http://java.sun.com/jsf/facelets"
    xmlns:p="http://primefaces.org/ui" template="/template.xhtml">
    <ui:define name="header">
        <ui:include src="/header.xhtml"></ui:include>
    </ui:define>
    <ui:define name="sideleft">
        <ui:include src="/sideleft.xhtml"></ui:include>
    </ui:define>
    <ui:define name="content">
        <p:panel id="unSuscribePanel">
            <h:form id="unSuscribeForm">
                <h1>¿Estás seguro que quieres causar baja?</h1>
                <p:commandButton process="@form" update=":unSuscribePanel"
                                 value="#{es_bundle.Si}" action="#{loginBean.unSuscribe()}"/>
                <p:commandButton process="@form" update=":unSuscribePanel"
                                 value="#{es_bundle.No}" action="#{loginBean.cancel()}"/> 
            </h:form>
        </p:panel>
    </ui:define>
    <ui:define name="footer">
        <ui:include src="/footer.xhtml"></ui:include>
    </ui:define>
</ui:composition>
