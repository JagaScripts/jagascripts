<?xml version='1.0' encoding='UTF-8' ?> 
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition 
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:ui="http://java.sun.com/jsf/facelets"
    xmlns:p="http://primefaces.org/ui" template="../../template.xhtml">
    <ui:define name="header">
        <ui:include src="../../header.xhtml"></ui:include>
    </ui:define>
    <ui:define name="sideleft">
        <ui:include src="../../sideleft.xhtml"></ui:include>
    </ui:define>
    <ui:define name="content">
        <p:panel id="rolesList">
            <h:form id="RolesListForm">
                <p:panel>
                    <p:dataTable id="datalist" value="#{rolesController.items}" var="item"
                                 selectionMode="single" selection="#{rolesController.selected}"
                                 paginator="true"
                                 rowKey="#{item.id}"
                                 rows="10"
                                 rowsPerPageTemplate="10,20,30,40,50"
                                 >
                        <f:facet name="header">
                             #{es_bundle.ListRolesTitle}
                        </f:facet>
                        <p:ajax event="rowSelect"   update="createButton viewButton editButton deleteButton"/>
                        <p:ajax event="rowUnselect" update="createButton viewButton editButton deleteButton"/>

                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{es_bundle.ListRolesTitle_id}"/>
                            </f:facet>
                            <h:outputText value="#{item.id}"/>
                        </p:column>
                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="#{es_bundle.ListRolesTitle_rolename}"/>
                            </f:facet>
                            <h:outputText value="#{item.rolename}"/>
                        </p:column>
                        <f:facet name="footer">
                            <p:commandButton id="createButton" icon="ui-icon-plus"   value="#{es_bundle.Create}" actionListener="#{rolesController.prepareCreate}" update=":RolesCreateForm" oncomplete="PF('RolesCreateDialog').show()"/>
                            <p:commandButton id="viewButton"   icon="ui-icon-search" value="#{es_bundle.View}" update=":RolesViewForm" oncomplete="PF('RolesViewDialog').show()" disabled="#{empty rolesController.selected}"/>
                            <p:commandButton id="editButton"   icon="ui-icon-pencil" value="#{es_bundle.Edit}" update=":RolesEditForm" oncomplete="PF('RolesEditDialog').show()" disabled="#{empty rolesController.selected}"/>
                            <p:commandButton id="deleteButton" icon="ui-icon-trash"  value="#{es_bundle.Delete}" actionListener="#{rolesController.destroy}" update=":growl,datalist" disabled="#{empty rolesController.selected}"/>
                        </f:facet>
                    </p:dataTable>
                </p:panel>
            </h:form>

            <ui:include src="Create.xhtml"/>
            <ui:include src="Edit.xhtml"/>
            <ui:include src="View.xhtml"/>
</p:panel>
 </ui:define>
    <ui:define name="footer">
        <ui:include src="../../footer.xhtml"></ui:include>
    </ui:define>
</ui:composition>
