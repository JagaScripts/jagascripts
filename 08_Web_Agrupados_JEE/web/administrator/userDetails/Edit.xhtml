<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

    <ui:composition>

        <p:dialog id="UserDetailsEditDlg" widgetVar="UserDetailsEditDialog" modal="true" resizable="false" appendTo="@(body)" header="#{es_bundle.EditUserDetailsTitle}">
            <h:form id="UserDetailsEditForm">
                <h:panelGroup id="display">
                    <p:panelGrid columns="2" rendered="#{userDetailsController.selected != null}">
                        <p:outputLabel value="#{es_bundle.EditUserDetailsLabel_id}" for="id" />
                        <p:inputText id="id" value="#{userDetailsController.selected.id}" disabled="true"/>
                        <p:outputLabel value="#{es_bundle.EditUserDetailsLabel_name}" for="name" />
                        <p:inputText id="name" value="#{userDetailsController.selected.name}" title="#{es_bundle.EditUserDetailsTitle_name}" required="true" requiredMessage="#{es_bundle.EditUserDetailsRequiredMessage_name}"/>
                        <p:outputLabel value="#{es_bundle.EditUserDetailsLabel_dniCif}" for="dniCif" />
                        <p:inputText id="dniCif" value="#{userDetailsController.selected.dniCif}" title="#{es_bundle.EditUserDetailsTitle_dniCif}" required="true" requiredMessage="#{es_bundle.EditUserDetailsRequiredMessage_dniCif}"/>
                        <p:outputLabel value="#{es_bundle.EditUserDetailsLabel_address}" for="address" />
                        <p:inputText id="address" value="#{userDetailsController.selected.address}" title="#{es_bundle.EditUserDetailsTitle_address}" required="true" requiredMessage="#{es_bundle.EditUserDetailsRequiredMessage_address}">
                            <p:ajax event="change" update="longitude,latitude"   
                                listener="#{userDetailsController.retrieveCoordinates()}" process="@this,address"/>
                        </p:inputText>
                        <p:outputLabel value="#{es_bundle.EditUserDetailsLabel_city}" for="city" />
                        <p:inputText id="city" value="#{userDetailsController.selected.city}" title="#{es_bundle.EditUserDetailsTitle_city}" required="true" requiredMessage="#{es_bundle.EditUserDetailsRequiredMessage_city}">
                            <p:ajax event="change" update="longitude,latitude"   
                                listener="#{userDetailsController.retrieveCoordinates()}" process="@this,city"/>
                        </p:inputText>
                        <p:outputLabel value="#{es_bundle.EditUserDetailsLabel_province}" for="province" />
                        <p:inputText id="province" value="#{userDetailsController.selected.province}" title="#{es_bundle.EditUserDetailsTitle_province}" required="true" requiredMessage="#{es_bundle.EditUserDetailsRequiredMessage_province}">
                            <p:ajax event="change" update="longitude,latitude"   
                                listener="#{userDetailsController.retrieveCoordinates()}" process="@this,province"/>
                        </p:inputText>
                        <p:outputLabel value="#{es_bundle.EditUserDetailsLabel_country}" for="country" />
                        <p:inputText id="country" value="#{userDetailsController.selected.country}" title="#{es_bundle.EditUserDetailsTitle_country}" required="true" requiredMessage="#{es_bundle.EditUserDetailsRequiredMessage_country}">
                            <p:ajax event="change" update="longitude,latitude"   
                                listener="#{userDetailsController.retrieveCoordinates()}" 
                                process="@this,country"/>
                        </p:inputText>
                        <p:outputLabel value="#{es_bundle.EditUserDetailsLabel_latitude}" for="latitude" />
                        <p:outputLabel id="latitude" value="#{userDetailsController.mapBean.address.latitude}" title="#{es_bundle.EditUserDetailsTitle_latitude}" />
                        <p:outputLabel value="#{es_bundle.EditUserDetailsLabel_longitude}" for="longitude" />
                        <p:outputLabel id="longitude" value="#{userDetailsController.mapBean.address.longitude}" title="#{es_bundle.EditUserDetailsTitle_longitude}" />
                        <p:outputLabel value="#{es_bundle.EditUserDetailsLabel_leavingDate}" for="leavingDate" />
                        <p:calendar id="leavingDate" pattern="MM/dd/yyyy" value="#{userDetailsController.selected.leavingDate}" title="#{es_bundle.EditUserDetailsTitle_leavingDate}"  showOn="button"/>
                        <p:outputLabel value="#{es_bundle.EditUserDetailsLabel_applicationUsersId}" for="applicationUsersId" />
                        <p:selectOneMenu id="applicationUsersId" value="#{userDetailsController.selected.applicationUsersId}" required="true" requiredMessage="#{es_bundle.EditUserDetailsRequiredMessage_applicationUsersId}">
                            <f:selectItem itemLabel="#{es_bundle.SelectOneMessage}"/>
                            <f:selectItems value="#{usersController.itemsAvailableSelectOne}"
                                           var="applicationUsersIdItem"
                                           itemValue="#{applicationUsersIdItem}"/>
                        </p:selectOneMenu>
                    </p:panelGrid>
                    <p:commandButton actionListener="#{userDetailsController.update}" value="#{es_bundle.Save}" update="display,:UserDetailsListForm:datalist,:growl" oncomplete="handleSubmit(args, 'UserDetailsEditDialog');"/>
                    <p:commandButton update="display,:UserDetailsListForm:datalist,:growl" value="#{es_bundle.Cancel}" onclick="UserDetailsEditDialog.hide()"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

    </ui:composition>
</html>
